# Set your own tooling in here
[binaries]
c = 'emcc.bat'
c++ = 'em++.bat'
ar = 'emar.bat'
ranlib = 'emranlib.bat'
strip = 'emstrip.bat'
pkg-config = 'pkg-config'
cmake = 'cmake'

[host_machine]
system = 'emscripten'
cpu_family = 'wasm32'
cpu = 'wasm32'
endian = 'little'

[properties]
cmake_toolchain_file = ''
